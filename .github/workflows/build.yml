name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      # NOTE: this is a multi-module build — the plugin jar is produced in
      # plugin/build/libs, NOT the root build/libs. (A root-level path here is
      # what causes "No files were found with the provided path".)
      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: plugin/build/libs/*.jar
          if-no-files-found: error
