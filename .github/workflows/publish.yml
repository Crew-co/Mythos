name: Publish API

# Publishes the addon API to GitHub Packages so addon projects can compile
# against it, and attaches the plugin jar to a GitHub Release.
#
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the release
  packages: write   # publish to GitHub Packages (without this it 403s)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # Version comes from the tag (v1.0.0 -> 1.0.0). `build` runs the tests, so
      # a broken API never gets published.
      - name: Build & publish API
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew build publishApi --no-daemon -Pversion=${GITHUB_REF_NAME#v}

      - name: Release the plugin jar
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/build/libs/*.jar   # multi-module: jar lives here
          generate_release_notes: true
          fail_on_unmatched_files: true
